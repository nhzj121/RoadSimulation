spring.application.name=RoadSimulation

spring.datasource.url=jdbc:mysql://localhost:3306/vehicle_scheduler?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8&useUnicode=true&zeroDateTimeBehavior=CONVERT_TO_NULL
spring.datasource.username=root
spring.datasource.password=123456

# ?JPA?????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

springdoc.swagger-ui.path=/swagger-ui.html

spring.devtools.restart.enabled=true
spring.devtools.restart.additional-paths=src/main/java

# per simulation need 5 second
# per simulation = 30 min
simulation.loop.interval-ms=5000
simulation.loop.minutes-per-loop=30

gaode.api.key=07af4682e25e80dfd3381e31a790ff7a

# ????????
app.vehicle.import.enabled=true
app.vehicle.import.file=car_data.json
app.vehicle.import.auto-startup=true

# ????
logging.level.org.example.roadsimulation.service.impl.VehicleDataImportServiceImpl=INFO

# POI ??????
app.poi.import.enabled=false
poi.import.file=poi_data.json

# ??????????
app.goods.import.enabled=false
goods.import.file=goods_data.json

# Temporarily disable startup processing shipment / assignment pre-generation.
# Set to true only when this module is ready to participate in simulation startup again.
app.simulation.startup-pre-generation.enabled=false

# ORIGINAL strategy VRP multi-order packing constraints.
app.simulation.original-vrp.min-load-factor=0.80
app.simulation.original-vrp.max-anchor-distance-km=400.0
app.simulation.original-vrp.max-marginal-cost=4000.0
app.simulation.original-vrp.min-added-tons-per-extra-km=0.02

# chche
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=1h
